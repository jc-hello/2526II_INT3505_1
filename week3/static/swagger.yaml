openapi: "3.0.3"
info:
  title: Items API
  description: >
    Simple Flask REST API with CRUD, JWT authentication,
    Cache-Control headers, and Swagger UI.
  version: "1.0.0"

servers:
  - url: /
    description: Current server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Sample item"
        description:
          type: string
          example: "A short description"
        status:
          type: string
          example: "active"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true

    ItemInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "New item"
        description:
          type: string
          example: "Optional description"

    LoginInput:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: password123

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /auth/login:
    post:
      summary: Obtain a JWT access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      summary: Return the authenticated user
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: string
        "401":
          description: Missing or invalid token

  /items/:
    get:
      summary: List items with filtering, sorting, and pagination
      tags: [Items]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (>= 1)
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: Items per page (1–100)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: Filter by exact status value (e.g. "active")
          schema:
            type: string
            example: active
        - name: q
          in: query
          description: Search substring in name or description (case-insensitive)
          schema:
            type: string
            example: laptop
        - name: sort_by
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [name, status, created_at]
            default: created_at
        - name: sort_order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated list of items (Cache-Control max-age=30)
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=30"
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
                  filters:
                    type: object
                    properties:
                      status:
                        type: string
                        nullable: true
                      q:
                        type: string
                        nullable: true
                  sort:
                    type: object
                    properties:
                      sort_by:
                        type: string
                      sort_order:
                        type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      total_items:
                        type: integer
                      total_pages:
                        type: integer
                      has_next:
                        type: boolean
                      has_previous:
                        type: boolean
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized

    post:
      summary: Create a new item
      tags: [Items]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized

  /items/{item_id}:
    parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get a single item
      tags: [Items]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: The item (Cache-Control max-age=60)
          headers:
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=60"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "401":
          description: Unauthorized
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      summary: Update an item
      tags: [Items]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemInput"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "401":
          description: Unauthorized
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete an item
      tags: [Items]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Unauthorized
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
