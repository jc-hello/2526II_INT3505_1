openapi: 3.0.3
info:
  title: Week4 Users API (OpenAPI Demo)
  description: >
    Educational OpenAPI file for Week 4.
    Covers paths, parameters, requestBody, responses, and reusable components.
  version: 1.0.0

servers:
  - url: /
    description: Local Flask server

paths:
  /users:
    get:
      summary: Get users list
      description: Return a paginated users list.
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
          description: Optional trace id for request tracking.
      responses:
        '200':
          $ref: '#/components/responses/UsersListResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'

    post:
      summary: Create a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateInput'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserIdParam'

    get:
      summary: Get user by ID
      tags: [Users]
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/UserNotFoundResponse'
        '500':
          $ref: '#/components/responses/InternalErrorResponse'

components:
  parameters:
    UserIdParam:
      name: userId
      in: path
      required: true
      description: User identifier
      schema:
        type: integer
        minimum: 1

    PageParam:
      name: page
      in: query
      required: false
      description: Current page number
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

  schemas:
    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Nguyen Van A
        email:
          type: string
          format: email
          example: nva@example.com
        createdAt:
          type: string
          format: date-time
          example: '2026-03-19T08:30:00Z'

    UserCreateInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 2
          example: Tran Thi B
        email:
          type: string
          format: email
          example: ttb@example.com

    Error:
      type: object
      properties:
        error:
          type: string
          example: Invalid request

    UsersList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            page:
              type: integer
            pageSize:
              type: integer
            total:
              type: integer

  responses:
    UsersListResponse:
      description: Users list returned
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UsersList'

    BadRequestResponse:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UserNotFoundResponse:
      description: User not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalErrorResponse:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
